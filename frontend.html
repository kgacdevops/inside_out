<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inside Out</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; text-align: center;}

    .button-group {
      display: flex;
      flex-direction: row;
      gap: 3.5rem;
      align-items: center;
      justify-content: center;
    }
    
    .fetch-btn {
      display: flex;
      align-items: center;
      gap: 3.5rem;
      padding: 0.6rem 0.6rem;
      font-size: 1rem;
      cursor: pointer;
      color: white;
      border: none;
      border-radius: 6px;
    }

    .fetch-btn:hover { background-color: #dbe9f462; }
    .fetch-btn img { width: 250px; height: 300px; }

    pre { 
      background: #dbe3eb; 
      padding: 1rem; 
      margin-top: 1rem; 
      border-radius: 6px; 
      font-size: 1rem; 
      font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; 
      word-wrap: break-word; 
      overflow-wrap: break-word; 
      width: 100%; 
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1><center>How are you feeling today?</center></h1>
  <br><br><br>
  
  <div class="button-group">
    <button class="fetch-btn" onclick="fetchVerse('happy')">
        <img src="photos/joy.jpg" alt="happy" />
    </button>
    <button class="fetch-btn" onclick="fetchVerse('angry')">
        <img src="photos/anger.jpg" alt="anger" />
    </button>
    <button class="fetch-btn" onclick="fetchVerse('anxious')">
        <img src="photos/anxiety.jpg" alt="anxiety" />
    </button>
    <button class="fetch-btn" onclick="fetchVerse('sad')">
        <img src="photos/sadness.jpg" alt="sadness" />
    </button>
  </div>
  <br><br><br>
  <pre id="output">Select the photo that best describes your mood today to receive your encouragement!</pre>

  <script>
    async function fetchVerse(mood) {
      const output = document.getElementById('output');
      output.textContent = 'Loading...';
      try {
        const res = await fetch('https://zukkxtph89.execute-api.us-east-2.amazonaws.com/api/verses_backend?mood=' + mood);
        const data = await res.json();
        output.textContent = "YOU ARE " + mood.toUpperCase() + "\n\n\n\"" + data.content + "\"\n\n" + data.reference
      } catch (err) {
        output.textContent = 'No available verse'
      }
    }
  </script>
</body>
</html>
